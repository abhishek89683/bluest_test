{% extends "base.html" %}

{% block title %}Add Expense - FinWise India{% endblock %}

{% block content %}
<div class="py-8">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex items-center mb-6">
                <i class="fas fa-receipt text-indigo-600 text-2xl mr-3"></i>
                <h1 class="text-2xl font-bold text-gray-900">Add New Expense</h1>
            </div>

            <form method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="category" class="block text-sm font-medium text-gray-700 mb-2">
                            Category <span class="text-red-500">*</span>
                        </label>
                        <select id="category" name="category" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="">Select a category</option>
                            <option value="Food">🍔 Food & Dining</option>
                            <option value="Transport">🚗 Transportation</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Utilities">💡 Utilities</option>
                            <option value="Healthcare">🏥 Healthcare</option>
                            <option value="Education">📚 Education</option>
                            <option value="Rent">🏠 Rent/Housing</option>
                            <option value="Family">👨‍👩‍👧‍👦 Family Support</option>
                            <option value="Other">📦 Other</option>
                        </select>
                    </div>

                    <div>
                        <label for="amount" class="block text-sm font-medium text-gray-700 mb-2">
                            Amount (₹) <span class="text-red-500">*</span>
                        </label>
                        <input type="number" id="amount" name="amount" step="0.01" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
                               placeholder="0.00">
                    </div>

                    <div>
                        <label for="date" class="block text-sm font-medium text-gray-700 mb-2">
                            Date <span class="text-red-500">*</span>
                        </label>
                        <input type="date" id="date" name="date" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
                            Description
                        </label>
                        <input type="text" id="description" name="description"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
                               placeholder="Optional description">
                    </div>
                </div>

                <div class="flex justify-end space-x-4">
                    <a href="{{ url_for('dashboard') }}" 
                       class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition">
                        Cancel
                    </a>
                    <button type="submit" 
                            class="px-6 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">
                        <i class="fas fa-plus mr-2"></i>Add Expense
                    </button>
                </div>
            </form>
        </div>

        <!-- Recent Expenses Summary -->
        <div class="mt-8 bg-white rounded-lg shadow p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Today's Expenses</h3>
            <div id="todayExpenses" class="space-y-2">
                <p class="text-gray-500 text-center py-4">Loading today's expenses...</p>
            </div>
        </div>
    </div>
</div>

<script>
// Set today's date as default
document.getElementById('date').valueAsDate = new Date();

// Load today's expenses
fetch('/api/today-expenses')
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById('todayExpenses');
        if (data.expenses && data.expenses.length > 0) {
            container.innerHTML = data.expenses.map(expense => `
                <div class="flex justify-between items-center py-2 border-b border-gray-100">
                    <div>
                        <span class="text-sm font-medium text-gray-700">${expense.category}</span>
                        <span class="text-xs text-gray-500 ml-2">${expense.description || ''}</span>
                    </div>
                    <span class="text-sm font-semibold text-red-600">₹${expense.amount.toFixed(2)}</span>
                </div>
            `).join('');
            
            const total = data.expenses.reduce((sum, exp) => sum + exp.amount, 0);
            container.innerHTML += `
                <div class="flex justify-between items-center pt-2 mt-2 border-t-2 border-gray-200">
                    <span class="font-semibold text-gray-900">Today's Total</span>
                    <span class="font-bold text-red-600">₹${total.toFixed(2)}</span>
                </div>
            `;
        } else {
            container.innerHTML = '<p class="text-gray-500 text-center py-4">No expenses recorded today.</p>';
        }
    })
    .catch(error => {
        document.getElementById('todayExpenses').innerHTML = '<p class="text-gray-500 text-center py-4">Unable to load expenses.</p>';
    });
</script>
{% endblock %}
